<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="index.css">
    <script>
    function toRepository(element){
        const name = element.getAttribute("data-repo");
        if (name) {
            const url = `https://github.com/A-Shrew/${name}`;
            window.open(url, "_blank");
        }
    }
    function toProject(element){
        const path = element.getAttribute("data-path");
        if (path) {
            window.location.href = path;
        }
    }
    </script>
</head>
<body>
    <div class="project">
        <div class="card" data-repo="Stock-Screener" onclick="toRepository(this)">
            <h2>Stock Screener</h2>
        </div>
        <div class="card" data-repo="capstone-project-team-10" onclick="toRepository(this)">
            <h2>Capstone Project</h2>
        </div>
        <div class="card" data-path="amazons/" onclick="toProject(this)">
            <h2>Amazons</h2>
        </div>
        <div class="card" data-repo="PortalKong" onclick="toRepository(this)">
            <h2>Portal Kong</h2>
        </div>
        <div class="card">
            <h2>Coming Soon</h2>
        </div>
    </div>
</body>
</html>
